version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jworden
      POSTGRES_USER: jworden
      POSTGRES_PASSWORD: jworden
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://jworden:jworden@postgres:5432/jworden
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      AUTO_CREATE_TABLES: 'false'
      JWORDEN_MASTER_KEY: dev-master-key
      JWT_SECRET_KEY: dev-jwt-secret
    ports:
      - '8000:8000'

  worker:
    build: .
    command: celery -A app.services.follow_up_tasks.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://jworden:jworden@postgres:5432/jworden
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      AUTO_CREATE_TABLES: 'false'

  beat:
    build: .
    command: celery -A app.services.follow_up_tasks.celery_app beat --loglevel=info
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://jworden:jworden@postgres:5432/jworden
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      AUTO_CREATE_TABLES: 'false'

volumes:
  postgres_data:

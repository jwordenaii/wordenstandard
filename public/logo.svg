<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" fill="none" role="img" aria-label="J. Worden &amp; Sons Asphalt Paving">
  <!-- Sophisticated dark gradient background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="560" height="120" rx="4" fill="transparent"/>
  
  <!-- The main mark -->
  <g transform="translate(10, 10)">
    <!-- Obsidian slab icon -->
    <rect width="60" height="100" rx="8" fill="#111111" />
    <path d="M10 20 L50 20 L50 80 L10 80 Z" fill="url(#goldGradient)" opacity="0.9" />
    <text x="30" y="62" font-family="'Playfair Display', serif" font-size="34" font-weight="900" 
          text-anchor="middle" fill="#111111" letter-spacing="-2">W</text>
  </g>
  
  <!-- Typography -->
    <g transform="translate(85, 42)">
      <text y="0" font-family="'Plus Jakarta Sans', sans-serif" font-size="34" font-weight="800" 
        fill="url(#goldGradient)" letter-spacing="1">J. WORDEN &amp; SONS</text>
      <text y="34" font-family="'Plus Jakarta Sans', sans-serif" font-size="18" font-weight="700" 
        fill="#FFFFFF" opacity="0.86" letter-spacing="3" text-transform="uppercase">ASPHALT PAVING</text>
    
    <!-- Foundation line -->
    <rect y="48" width="420" height="1" fill="url(#goldGradient)" opacity="0.3"/>
    <text x="210" y="64" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="300" 
          fill="#FFFFFF" opacity="0.4" text-anchor="middle" letter-spacing="2">ESTABLISHED 1984 · VIRGINIA</text>
  </g>
</svg>

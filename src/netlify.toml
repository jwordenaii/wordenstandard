# Netlify configuration for J. Worden & Sons
# This file takes precedence over public/_redirects and is more reliable
# because it has a file extension that build pipelines always respect.

# ============================================================
# STATIC FILE ESCAPE HATCHES (must come FIRST — force = true)
# Prevents the SPA fallback from intercepting these files and
# returning the React app's index.html instead of the real content.
# ============================================================
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# ============================================================
# PRIMARY DOMAIN CANONICALIZATION
# www.jwordenasphaltpaving.com → jwordenasphaltpaving.com
# Prevents Google from splitting indexing and fixes stale asset errors
# ============================================================
[[redirects]]
  from = "https://www.jwordenasphaltpaving.com/*"
  to = "https://jwordenasphaltpaving.com/:splat"
  status = 301
  force = true


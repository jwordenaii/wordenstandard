# GitLab CI pipeline — mirror of .github/workflows/ci.yml essentials.
# Runs on every push and merge request. Caches node_modules between runs.
# The original .github/workflows/ files are preserved for reference and will
# be ignored by GitLab.

stages:
  - install
  - verify

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/

install:
  stage: install
  script:
    - npm ci --prefer-offline --no-audit --no-fund
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: verify
  needs: ["install"]
  script:
    - npm run lint

build:
  stage: verify
  needs: ["install"]
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# Optional: enable once you confirm tests run clean in CI.

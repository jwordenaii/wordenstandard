name: Reliability Synthetic Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  synthetic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run synthetic reliability monitor
        env:
          RELIABILITY_BASE_URL: ${{ secrets.RELIABILITY_BASE_URL }}
          RELIABILITY_ADMIN_TOKEN: ${{ secrets.RELIABILITY_ADMIN_TOKEN }}
        run: npm run ops:reliability-synthetic -- --allow-skip --require-base-url

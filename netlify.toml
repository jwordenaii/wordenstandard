# ── Command Center — Edge Protection ───────────────────────────────────────
# VITE_CC_PASSWORD is a client-side convenience deterrent only (see CommandCenter.jsx).
# For genuine access control, add one of these layers:
#
# Option A — Netlify Password Protection (Pro plan, site-wide):
#   Enable in Site Settings → Access control → Password protection.
#   No toml changes required; all routes are protected at the CDN edge.
#
# Option B — Netlify Edge Functions (granular, free tier):
#   Create netlify/edge-functions/command-center-auth.ts to intercept requests
#   to /command-center, read a COMMAND_CENTER_SECRET environment variable, and
#   validate a cookie or header before forwarding to the SPA.
#   Declare the edge function below (currently disabled — uncomment to activate):
#
# [[edge_functions]]
#   path = "/command-center"
#   function = "command-center-auth"
#
# Option C — Block via HTTP Basic Auth (Netlify Enterprise / Netlify Identity):
#   Use Netlify Identity to require authentication on the whole site or specific paths.
#
# Until one of the above is enabled, /command-center is protected only by the
# client-side PIN gate (VITE_CC_PASSWORD). Do NOT store sensitive operations data
# in the frontend when relying solely on this gate.

[build]
  command = "npm run build"
  publish = "dist"
  node_bundler = "esbuild"
  preload = false

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  VITE_API_BASE_URL = "https://codexbuildfreeofbase44-production.up.railway.app"
  VITE_SITE_URL = "https://www.jwordenasphaltpaving.com"

# Exclude static files from SPA fallback
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & cache headers.
# Netlify deploy previews need iframe access from Netlify's dashboard, so
# frame control is handled with CSP frame-ancestors instead of X-Frame-Options.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://app.netlify.com https://*.netlify.app; frame-ancestors 'self' https://app.netlify.com https://*.netlify.app; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

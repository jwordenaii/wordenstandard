# ── Command Center — Edge Protection ───────────────────────────────────────
# The edge function `command-center-auth` runs before the SPA is served for
# every request to /command-center and /command-center/*.
#
# REQUIRED NETLIFY ENVIRONMENT VARIABLE (server-side — never VITE_):
#   COMMAND_CENTER_PIN   Set this in Netlify UI → Site → Environment variables.
#                        Use the 4-digit PIN you want to protect the page with.
#                        Example: COMMAND_CENTER_PIN=1025
#
# The VITE_CC_PASSWORD variable provides a secondary client-side deterrent
# (see CommandCenter.jsx), but COMMAND_CENTER_PIN is the real protection layer.

[[edge_functions]]
  path = "/command-center"
  function = "command-center-auth"

[[edge_functions]]
  path = "/command-center/*"
  function = "command-center-auth"

[build]
  command = "npm run build"
  publish = "dist"
  node_bundler = "esbuild"
  preload = false

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  VITE_API_BASE_URL = "https://codexbuildfreeofbase44-production.up.railway.app"
  VITE_SITE_URL = "https://www.jwordenasphaltpaving.com"

# ── API proxy — forward /api/* to Railway backend ─────────────────────────────
# This enables the frontend to use relative /api/... paths as a fallback when
# VITE_API_BASE_URL is not set, and provides an edge-layer proxy for production.
[[redirects]]
  from = "/api/*"
  to = "https://codexbuildfreeofbase44-production.up.railway.app/api/:splat"
  status = 200
  force = true
  [redirects.headers]
    X-Forwarded-Host = "www.jwordenasphaltpaving.com"

# Exclude static files from SPA fallback
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & cache headers.
# Netlify deploy previews need iframe access from Netlify's dashboard, so
# frame control is handled with CSP frame-ancestors instead of X-Frame-Options.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://app.netlify.com https://*.netlify.app; frame-ancestors 'self' https://app.netlify.com https://*.netlify.app; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

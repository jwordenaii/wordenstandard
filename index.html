    <!-- Font display swap — prevents FOIT (invisible text while fonts load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />

    <!-- Preload Bebas Neue woff2 (used by H1 on homepage) so it arrives
         before LCP and prevents the layout shift when display-swap kicks in. -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
      href="https://fonts.gstatic.com/s/bebasneue/v16/JTUSjIg69CK48gW7PXoo9WlhyyTh89Y.woff2" />

    <!-- Google Fonts CSS in <head> so the browser discovers font URLs
         immediately instead of waiting for our app CSS to parse @import. -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" />

    <!-- LCP preload: homepage hero image (used by SmartImage on / route).
         Only preload AVIF (smallest, ~84KB, supported by all modern browsers).
         Older browsers still get WebP/JPG via the <picture> fallback inside
         SmartImage; we just don't preload those (preloading both wastes ~100KB
         on the critical path because <link preload as=image> ignores `type`). -->
    <link rel="preload" as="image" href="/work/portfolio/portfolio-010.avif" type="image/avif" fetchpriority="high" />

    <!-- Google tag (gtag.js) — Google Ads + GA4
         Loaded on requestIdleCallback so it doesn't block LCP. The dataLayer
         + gtag stub is set up immediately so any early gtag() calls queue
         correctly and are flushed once gtag.js downloads. Conversion labels:
           VITE_GADS_LABEL_LEAD_FORM, VITE_GADS_LABEL_PHONE_CLICK -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'AW-1410045668');
      gtag('set', 'allow_enhanced_conversions', true);
      (function(){
        var load = function(){
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=AW-1410045668';
          document.head.appendChild(s);
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(load, { timeout: 4000 });
        } else {
          window.addEventListener('load', function(){ setTimeout(load, 1500); });
        }
      })();
    </script>

    <!--
      Netlify Forms registration: hidden form so Netlify's build-time
      crawler detects "lead-fallback" and routes any POST to that form
      name into the dashboard + email notifications. NEVER displayed.
      Used by netlify/functions/lead-fallback-notify.js as a guaranteed
      delivery path even when SendGrid is misconfigured.
    -->
    <form name="lead-fallback" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="address" />
      <input type="text" name="service" />
